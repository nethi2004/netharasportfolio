<!-- java script section for mobile compatibility -->
  <script>
    const icon = document.querySelector('.material-symbols-outlined');
  const section = document.querySelector('.thisbody');

  function handleScroll() {
    if (window.innerWidth <= 768) { // mobile breakpoint
      const sectionTop = section.getBoundingClientRect().top;

      if (sectionTop <= 50) {
        icon.style.color = '#d86eac';
      } else {
        icon.style.color = 'white';
      }
    } else {
      // desktop: reset to default
      icon.style.color = 'white';
    }
  }

  window.addEventListener('scroll', handleScroll);
  window.addEventListener('resize', handleScroll);
  
    function toggleSheet() {
        const sheet = document.getElementById("bottom-sheet");
const icon = document.getElementById("expandIcon");

sheet.classList.toggle("open");

document.body.style.overflow =
sheet.classList.contains("open") ? "hidden" : "";

icon.textContent = sheet.classList.contains("open")
? "expand_more"
: "expand_less";
    }
  </script>
